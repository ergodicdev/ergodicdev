<svg width="900" height="180" viewBox="0 0 900 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .p { animation: drift 6s ease-in-out infinite alternate; }
      .p1 { animation-duration: 7s; }
      .p2 { animation-duration: 5.5s; animation-delay: -1s; }
      .p3 { animation-duration: 8s; animation-delay: -2s; }
      .p4 { animation-duration: 6.5s; animation-delay: -0.5s; }
      .p5 { animation-duration: 9s; animation-delay: -3s; }
      .p6 { animation-duration: 5s; animation-delay: -1.5s; }
      .p7 { animation-duration: 7.5s; animation-delay: -2.5s; }
      .p8 { animation-duration: 6s; animation-delay: -4s; }
      .p9 { animation-duration: 8.5s; animation-delay: -0.8s; }
      .p10 { animation-duration: 5.8s; animation-delay: -3.5s; }
      .ln { animation: fadeln 4s ease-in-out infinite alternate; }
      .ln2 { animation-duration: 5s; animation-delay: -1s; }
      .ln3 { animation-duration: 6s; animation-delay: -2s; }
      .ln4 { animation-duration: 4.5s; animation-delay: -0.5s; }
      @keyframes drift {
        0%   { transform: translate(0px, 0px); }
        25%  { transform: translate(4px, -6px); }
        50%  { transform: translate(-3px, 5px); }
        75%  { transform: translate(6px, 2px); }
        100% { transform: translate(-5px, -4px); }
      }
      @keyframes fadeln {
        0%   { opacity: 0.08; }
        50%  { opacity: 0.22; }
        100% { opacity: 0.06; }
      }
      .title-text {
        font-family: 'Courier New', Courier, monospace;
        font-weight: 700;
        font-size: 38px;
        fill: #58a6ff;
        letter-spacing: 3px;
      }
      .sub-text {
        font-family: 'Courier New', Courier, monospace;
        font-size: 13px;
        fill: #7d8590;
        letter-spacing: 1.5px;
      }
      .tag-text {
        font-family: 'Courier New', Courier, monospace;
        font-size: 11px;
        letter-spacing: 1px;
      }
      .cursor {
        animation: blink 1.1s step-end infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="180" fill="#0d1117"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="60" x2="900" y2="60" stroke="#161b22" stroke-width="0.5"/>
  <line x1="0" y1="120" x2="900" y2="120" stroke="#161b22" stroke-width="0.5"/>
  <line x1="180" y1="0" x2="180" y2="180" stroke="#161b22" stroke-width="0.5"/>
  <line x1="360" y1="0" x2="360" y2="180" stroke="#161b22" stroke-width="0.5"/>
  <line x1="540" y1="0" x2="540" y2="180" stroke="#161b22" stroke-width="0.5"/>
  <line x1="720" y1="0" x2="720" y2="180" stroke="#161b22" stroke-width="0.5"/>

  <!-- Connection lines (animated) -->
  <line class="ln"  x1="620" y1="28"  x2="710" y2="55"  stroke="#58a6ff" stroke-width="0.8"/>
  <line class="ln2" x1="710" y1="55"  x2="780" y2="30"  stroke="#58a6ff" stroke-width="0.8"/>
  <line class="ln3" x1="780" y1="30"  x2="850" y2="70"  stroke="#3fb950" stroke-width="0.8"/>
  <line class="ln"  x1="620" y1="28"  x2="680" y2="90"  stroke="#58a6ff" stroke-width="0.6"/>
  <line class="ln4" x1="680" y1="90"  x2="760" y2="110" stroke="#58a6ff" stroke-width="0.6"/>
  <line class="ln2" x1="760" y1="110" x2="850" y2="70"  stroke="#3fb950" stroke-width="0.6"/>
  <line class="ln3" x1="710" y1="55"  x2="760" y2="110" stroke="#58a6ff" stroke-width="0.5"/>
  <line class="ln"  x1="780" y1="30"  x2="840" y2="140" stroke="#3fb950" stroke-width="0.5"/>
  <line class="ln4" x1="840" y1="140" x2="760" y2="110" stroke="#58a6ff" stroke-width="0.6"/>
  <line class="ln2" x1="840" y1="140" x2="880" y2="155" stroke="#3fb950" stroke-width="0.5"/>
  <line class="ln3" x1="620" y1="28"  x2="560" y2="50"  stroke="#58a6ff" stroke-width="0.5"/>
  <line class="ln"  x1="560" y1="50"  x2="600" y2="120" stroke="#58a6ff" stroke-width="0.5"/>
  <line class="ln4" x1="600" y1="120" x2="680" y2="90"  stroke="#58a6ff" stroke-width="0.5"/>
  <line class="ln2" x1="560" y1="50"  x2="500" y2="20"  stroke="#3fb950" stroke-width="0.5"/>
  <line class="ln3" x1="500" y1="20"  x2="430" y2="40"  stroke="#3fb950" stroke-width="0.5"/>
  <line class="ln"  x1="880" y1="155" x2="840" y2="140" stroke="#3fb950" stroke-width="0.4"/>

  <!-- Particle nodes (animated) -->
  <g class="p p1"><circle cx="620" cy="28"  r="4"  fill="#58a6ff" opacity="0.9"/></g>
  <g class="p p2"><circle cx="710" cy="55"  r="3.5" fill="#58a6ff" opacity="0.8"/></g>
  <g class="p p3"><circle cx="780" cy="30"  r="3"  fill="#3fb950" opacity="0.85"/></g>
  <g class="p p4"><circle cx="850" cy="70"  r="4"  fill="#3fb950" opacity="0.9"/></g>
  <g class="p p5"><circle cx="680" cy="90"  r="3"  fill="#58a6ff" opacity="0.75"/></g>
  <g class="p p6"><circle cx="760" cy="110" r="3.5" fill="#58a6ff" opacity="0.8"/></g>
  <g class="p p7"><circle cx="840" cy="140" r="3"  fill="#3fb950" opacity="0.7"/></g>
  <g class="p p8"><circle cx="560" cy="50"  r="2.5" fill="#58a6ff" opacity="0.7"/></g>
  <g class="p p9"><circle cx="600" cy="120" r="2.5" fill="#58a6ff" opacity="0.65"/></g>
  <g class="p p10"><circle cx="500" cy="20" r="2"  fill="#3fb950" opacity="0.6"/></g>
  <g class="p p1"><circle cx="430" cy="40"  r="2"  fill="#3fb950" opacity="0.55"/></g>
  <g class="p p3"><circle cx="880" cy="155" r="2"  fill="#3fb950" opacity="0.5"/></g>

  <!-- Glow behind title -->
  <ellipse cx="245" cy="90" rx="220" ry="70" fill="#0d2044" opacity="0.6"/>

  <!-- Main title -->
  <text x="50" y="82" class="title-text">ergodicdev</text>
  <text x="50" y="82" class="title-text cursor" dx="298">_</text>

  <!-- Subtitle lines -->
  <text x="52" y="108" class="sub-text">Miguel Silva Caju · Data Science &amp; AI</text>
  <text x="52" y="128" class="sub-text">Lima, Perú · MLflow · Databricks · PyTorch</text>

  <!-- Tags -->
  <rect x="52"  y="140" width="122" height="20" rx="10" fill="#1f3a5f" opacity="0.9"/>
  <text x="113" y="154" class="tag-text" fill="#58a6ff" text-anchor="middle">machine-learning</text>

  <rect x="182" y="140" width="110" height="20" rx="10" fill="#1f3a5f" opacity="0.9"/>
  <text x="237" y="154" class="tag-text" fill="#58a6ff" text-anchor="middle">deep-learning</text>

  <rect x="300" y="140" width="80" height="20" rx="10" fill="#1a3320" opacity="0.9"/>
  <text x="340" y="154" class="tag-text" fill="#3fb950" text-anchor="middle">mlflow</text>

  <rect x="388" y="140" width="90" height="20" rx="10" fill="#1a3320" opacity="0.9"/>
  <text x="433" y="154" class="tag-text" fill="#3fb950" text-anchor="middle">databricks</text>

  <!-- Bottom border accent -->
  <line x1="0" y1="179" x2="900" y2="179" stroke="#21262d" stroke-width="1"/>
  <line x1="0" y1="179" x2="300" y2="179" stroke="#58a6ff" stroke-width="1.5" opacity="0.5"/>
</svg>
